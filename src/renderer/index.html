<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>ToolBox</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🧰 ToolBox</h1>
      <p class="subtitle">Electron + TypeScript 桌面应用</p>
    </header>

    <main class="main">
      <section class="section">
        <h2>应用信息</h2>
        <div id="app-info">
          <p class="loading">加载中...</p>
        </div>
      </section>

      <section class="section">
        <h2>快速开始</h2>
        <div class="guide">
          <div class="guide-item">
            <span class="step">1</span>
            <div>
              <strong>主进程</strong>
              <p>编辑 <code>src/main/main.ts</code> 来配置窗口和系统功能</p>
            </div>
          </div>
          <div class="guide-item">
            <span class="step">2</span>
            <div>
              <strong>预加载脚本</strong>
              <p>编辑 <code>src/main/preload.ts</code> 来暴露安全的 API</p>
            </div>
          </div>
          <div class="guide-item">
            <span class="step">3</span>
            <div>
              <strong>渲染进程</strong>
              <p>编辑 <code>src/renderer/</code> 目录下的文件来构建 UI</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Made with ❤️ using Electron + TypeScript</p>
    </footer>
  </div>

  <script src="../../dist/renderer/renderer.js" type="module"></script>
</body>
</html>
